name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify Vite output (not raw repo index.html)
        run: |
          test -f dist/index.html
          if grep -q '/src/main.jsx' dist/index.html; then
            echo 'Build error: dist still looks like dev index.html'
            exit 1
          fi
          if ! grep -qE '/screen-store/assets/[^"]+\.(js|css)' dist/index.html; then
            echo 'Build error: dist/index.html missing hashed /screen-store/assets bundle'
            cat dist/index.html
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
